<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 Pink Galaxy Bible — Interactive Learning Platform</title>
  
  <!-- Modular CSS Architecture -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/topbar.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/mindmap.css">
  <link rel="stylesheet" href="css/module.css">
  <link rel="stylesheet" href="css/cheatsheets.css">
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <!-- Top Navigation Bar -->
  <div class="top">
    <div class="logo">
      <span>🌸</span>
      Pink Galaxy Bible v2
    </div>
    
    <div class="nav-tabs">
      <button class="nav-tab active" data-view="dashboard">📊 Dashboard</button>
      <button class="nav-tab" data-view="mindmap">🧠 Mindmap</button>
      <button class="nav-tab" data-view="cheatsheets">📋 Cheatsheets</button>
    </div>
    
    <div class="top-right">
      <input type="text" class="search-mini" placeholder="🔍 Search modules...">
      <div class="xp-badge">
        <span>⭐</span>
        <span class="xp-amount">0</span>
        <span>XP</span>
      </div>
      <div class="streak-badge">🔥 0</div>
      <button class="tbtn">linda</button>
    </div>
  </div>

  <!-- Main Container -->
  <div class="container">
    
    <!-- Dashboard View -->
    <div id="dashboard-view" class="view active">
      <div class="dash-header">
        <h1>🌸 Pink Galaxy Bible v2</h1>
        <p>Interactive Learning System for Neurodivergent Developers</p>
        
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-num" data-stat="modules">0</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" data-stat="total">19</div>
            <div class="stat-label">Total Modules</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" data-stat="xp">0</div>
            <div class="stat-label">Total XP</div>
          </div>
          <div class="stat-card green">
            <div class="stat-num" data-stat="level">1</div>
            <div class="stat-label">Level</div>
          </div>
        </div>
      </div>
      
      <!-- Filters -->
      <div class="filters">
        <div class="filter-group">
          <button class="fbtn on" data-filter="universe" data-value="all">All</button>
          <button class="fbtn" data-filter="universe" data-value="arch">🐧 Arch</button>
          <button class="fbtn" data-filter="universe" data-value="bash">⚡ Bash</button>
          <button class="fbtn" data-filter="universe" data-value="python">🐍 Python</button>
          <button class="fbtn" data-filter="universe" data-value="security">🔒 Security</button>
          <button class="fbtn" data-filter="universe" data-value="cloud">☁️ Cloud</button>
          <button class="fbtn" data-filter="universe" data-value="tools">🛠️ Tools</button>
        </div>
        
        <div class="filter-group">
          <button class="fbtn on" data-filter="difficulty" data-value="all">All Levels</button>
          <button class="fbtn green" data-filter="difficulty" data-value="beg">Beginner</button>
          <button class="fbtn" data-filter="difficulty" data-value="int">Intermediate</button>
          <button class="fbtn purple" data-filter="difficulty" data-value="adv">Advanced</button>
        </div>
        
        <div class="filter-group">
          <button class="fbtn on" data-filter="volume" data-value="all">All Volumes</button>
          <button class="fbtn" data-filter="volume" data-value="1">Volume 1</button>
          <button class="fbtn" data-filter="volume" data-value="2">Volume 2</button>
          <button class="fbtn" data-filter="volume" data-value="3">Volume 3</button>
        </div>
      </div>
      
      <!-- Module Cards Grid -->
      <div class="cards">
        <!-- Cards will be dynamically generated by engine.js -->
      </div>
    </div>
    
    <!-- Mindmap View -->
    <div id="mindmap-view" class="view">
      <div class="map-controls">
        <button class="map-type active" data-type="clusters">
          <span class="icon">🌸</span>
          Clusters
        </button>
        <button class="map-type" data-type="network">
          <span class="icon">🌐</span>
          Network
        </button>
        <button class="map-type" data-type="radial">
          <span class="icon">⭐</span>
          Radial
        </button>
        <button class="map-type" data-type="heatmap">
          <span class="icon">🔥</span>
          Heatmap
        </button>
        <button class="map-type" data-type="timeline">
          <span class="icon">📅</span>
          Timeline
        </button>
        <button class="map-type" data-type="bubbles">
          <span class="icon">🫧</span>
          Bubbles
        </button>
        <button class="map-type" data-type="tree">
          <span class="icon">🌳</span>
          Tree
        </button>
        <button class="map-type" data-type="spiral">
          <span class="icon">🌀</span>
          Spiral
        </button>
        <button class="map-type" data-type="constellation">
          <span class="icon">✨</span>
          Constellation
        </button>
        <button class="map-type" data-type="galaxy">
          <span class="icon">🌌</span>
          Galaxy
        </button>
      </div>
      
      <div class="map-canvas">
        <!-- Mindmap nodes will be dynamically generated -->
      </div>
    </div>
    
    <!-- Cheatsheets View -->
    <div id="cheatsheets-view" class="view">
      <div class="cheat-search">
        <input type="text" placeholder="🔍 Search cheatsheets...">
      </div>
      
      <div class="cheat-filters">
        <!-- Filters will be dynamically generated -->
      </div>
      
      <div class="cheat-grid">
        <!-- Cheatsheet cards will be dynamically generated -->
      </div>
    </div>
    
    <!-- Module Detail View -->
    <div id="module-view" class="view">
      <!-- Module content will be dynamically generated -->
    </div>
  </div>

  <!-- Modular JavaScript Architecture -->
  <script src="js/engine.js"></script>
  <script src="js/modules.js"></script>
  <script src="js/mindmap.js"></script>
  <script src="js/cheatsheets.js"></script>
</body>
</html>
