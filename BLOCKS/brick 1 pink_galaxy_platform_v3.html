<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Pink Galaxy Platform — Your Learning Operating System</title>
<style>
:root{--p:#e91e63;--pl:#f8bbd0;--pd:#880e4f;--pg:rgba(233,30,99,.25);--g:#2e7d32;--gl:#a5d6a7;--gd:#1b5e20;--gg:rgba(46,125,50,.25);--bg:#0a0a12;--s1:#0f0f1e;--s2:#1a1a2e;--s3:#242440;--tx:#e8e6f0;--t2:#a8a6b8;--mt:#6c6a7e;--bd:rgba(233,30,99,.18);--bdg:rgba(46,125,50,.2);--r:12px;--purple:#9c27b0;--blue:#5c6bc0;--cyan:#00acc1;--orange:#ff9800;--yellow:#ffd600;--danger:#ff5252;--font:Calibri,"Segoe UI",sans-serif;--mono:"Courier New",monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:11pt;line-height:1.6;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 15% 50%,rgba(233,30,99,.05),transparent 50%),radial-gradient(ellipse at 85% 25%,rgba(46,125,50,.04),transparent 50%);}
a{color:var(--p);text-decoration:none;}a:hover{color:var(--pl);}
::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-thumb{background:var(--pd);border-radius:3px;}

/* ═══ TOP BAR ═══ */
.top{position:fixed;top:0;left:0;right:0;height:48px;background:rgba(15,15,30,.95);border-bottom:1px solid var(--bd);z-index:9000;display:flex;align-items:center;padding:0 14px;gap:8px;backdrop-filter:blur(16px);}
.logo{font-weight:bold;font-size:13pt;color:var(--p);white-space:nowrap;}
.vtabs{display:flex;gap:2px;margin-left:12px;overflow-x:auto;}
.vtab{padding:5px 14px;border-radius:8px;cursor:pointer;font-size:8.5pt;color:var(--t2);border:1px solid transparent;transition:all .2s;font-family:inherit;background:none;white-space:nowrap;}
.vtab:hover{color:var(--pl);background:rgba(233,30,99,.05);}
.vtab.on{color:#fff;border-color:var(--p);background:rgba(233,30,99,.15);}
.tright{margin-left:auto;display:flex;gap:6px;align-items:center;}
.srch{padding:5px 12px 5px 28px;background:var(--s2);border:1px solid var(--bd);border-radius:18px;color:var(--tx);font-size:9pt;width:180px;outline:none;font-family:inherit;transition:width .3s;}
.srch:focus{border-color:var(--p);width:260px;box-shadow:0 0 10px var(--pg);}
.srch::placeholder{color:var(--mt);}
.xp-pill{display:flex;align-items:center;gap:4px;padding:3px 10px;background:linear-gradient(135deg,var(--pd),var(--p));border-radius:14px;font-size:8pt;font-weight:bold;color:#fff;}
.streak-pill{padding:3px 8px;background:rgba(255,214,0,.12);border:1px solid rgba(255,214,0,.25);border-radius:14px;font-size:8pt;color:var(--yellow);}
.lvl-pill{padding:3px 8px;background:rgba(156,39,176,.15);border:1px solid rgba(156,39,176,.3);border-radius:14px;font-size:8pt;color:#ce93d8;}
.tb{background:none;border:1px solid var(--bd);color:var(--t2);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:14px;}
.tb:hover{background:var(--p);color:#fff;border-color:var(--p);}

/* ═══ CONTAINER ═══ */
.main{margin-top:48px;min-height:calc(100vh - 48px);position:relative;z-index:1;}
.view{display:none;padding:16px 20px 60px;}
.view.on{display:block;animation:fi .25s;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ═══ DASHBOARD ═══ */
.dash-head{text-align:center;padding:24px 10px 16px;}
.dash-head h1{font-size:22pt;color:var(--p);text-shadow:0 0 20px var(--pg);margin-bottom:4px;}
.dash-head p{color:var(--t2);font-size:10pt;}
.stats{display:flex;justify-content:center;gap:12px;margin:14px 0;flex-wrap:wrap;}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:100px;}
.stat b{display:block;font-size:18pt;color:var(--p);}
.stat small{font-size:7.5pt;color:var(--mt);text-transform:uppercase;letter-spacing:1px;}
.stat.gn b{color:var(--gl);}

/* Universe selector pills */
.uni-row{display:flex;justify-content:center;gap:6px;margin:14px 0;flex-wrap:wrap;}
.uni-pill{padding:5px 16px;border-radius:20px;border:1px solid var(--bd);cursor:pointer;font-size:8.5pt;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px;background:none;color:var(--t2);}
.uni-pill:hover{transform:translateY(-1px);}
.uni-pill.on{color:#fff;}
.uni-pill[data-u="all"].on{background:var(--p);border-color:var(--p);}
.uni-pill[data-u="ARCH"].on{background:#c62828;border-color:#c62828;}
.uni-pill[data-u="BASH"].on{background:var(--g);border-color:var(--g);}
.uni-pill[data-u="PYTHON"].on{background:#1565c0;border-color:#1565c0;}
.uni-pill[data-u="SEC"].on{background:var(--danger);border-color:var(--danger);}
.uni-pill[data-u="CLOUD"].on{background:var(--orange);border-color:var(--orange);}
.uni-pill[data-u="REF"].on{background:var(--purple);border-color:var(--purple);}
.uni-pill[data-u="GUIDES"].on{background:var(--p);border-color:var(--p);}

/* Filter row */
.frow{display:flex;justify-content:center;gap:4px;margin:6px 0;flex-wrap:wrap;}
.fp{padding:3px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:none;color:var(--mt);font-size:7.5pt;cursor:pointer;font-family:inherit;}
.fp:hover,.fp.on{background:rgba(233,30,99,.12);color:var(--pl);border-color:var(--bd);}

/* Cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:10px 0 40px;max-width:1400px;margin:0 auto;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.card:hover{border-color:var(--p);transform:translateY(-2px);box-shadow:0 6px 20px rgba(233,30,99,.12);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.card[data-u="ARCH"]::before{background:linear-gradient(90deg,#c62828,#e53935);}
.card[data-u="BASH"]::before{background:linear-gradient(90deg,var(--gd),var(--g));}
.card[data-u="PYTHON"]::before{background:linear-gradient(90deg,#0d47a1,#1976d2);}
.card[data-u="SEC"]::before{background:linear-gradient(90deg,#b71c1c,var(--danger));}
.card[data-u="CLOUD"]::before{background:linear-gradient(90deg,#e65100,var(--orange));}
.card[data-u="REF"]::before{background:linear-gradient(90deg,#6a1b9a,var(--purple));}
.card[data-u="GUIDES"]::before{background:linear-gradient(90deg,var(--pd),var(--p));}
.card-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.card-id{font-size:7.5pt;color:var(--mt);font-family:var(--mono);letter-spacing:1px;}
.card-diff{font-size:6.5pt;padding:2px 7px;border-radius:8px;font-weight:bold;text-transform:uppercase;}
.cd-b{background:rgba(46,125,50,.2);color:var(--gl);}
.cd-i{background:rgba(255,152,0,.2);color:var(--orange);}
.cd-a{background:rgba(233,30,99,.2);color:var(--pl);}
.card h3{font-size:10.5pt;color:var(--tx);margin-bottom:4px;line-height:1.3;}
.card-desc{font-size:8.5pt;color:var(--t2);margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px;}
.tg{padding:1px 6px;border-radius:6px;font-size:6.5pt;}
.tg-p{background:rgba(233,30,99,.08);color:var(--pl);}
.tg-g{background:rgba(46,125,50,.08);color:var(--gl);}
.tg-b{background:rgba(92,107,192,.1);color:var(--blue);}
.card-bar{display:flex;align-items:center;gap:6px;}
.bar{flex:1;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;}
.fill{height:100%;background:linear-gradient(90deg,var(--p),var(--g));border-radius:3px;transition:width .4s;}
.pct{font-size:7.5pt;color:var(--mt);min-width:24px;text-align:right;}

/* ═══ MINDMAP ═══ */
.map-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.mt-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--bd);background:none;color:var(--t2);cursor:pointer;font-size:8.5pt;font-family:inherit;display:flex;align-items:center;gap:4px;transition:all .15s;}
.mt-btn:hover,.mt-btn.on{background:var(--p);color:#fff;border-color:var(--p);}
.map-c{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);min-height:500px;position:relative;overflow:hidden;}
.mn{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:7pt;text-align:center;font-weight:bold;color:#fff;line-height:1.1;padding:3px;transition:all .15s;z-index:10;}
.mn:hover{transform:scale(1.2);box-shadow:0 0 16px rgba(233,30,99,.4);z-index:100;}
.mn[data-u="ARCH"]{background:#c62828;}.mn[data-u="BASH"]{background:var(--g);}.mn[data-u="PYTHON"]{background:#1565c0;}.mn[data-u="SEC"]{background:var(--danger);}.mn[data-u="CLOUD"]{background:var(--orange);}.mn[data-u="REF"]{background:var(--purple);}.mn[data-u="GUIDES"]{background:var(--p);}
.ml{position:absolute;background:rgba(255,255,255,.06);height:1px;transform-origin:0 50%;pointer-events:none;}
.map-legend{display:flex;gap:10px;padding:6px 0;font-size:7.5pt;color:var(--mt);flex-wrap:wrap;}
.ld{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:3px;vertical-align:middle;}

/* ═══ MODULE VIEW ═══ */
.mod-back{display:inline-flex;align-items:center;gap:5px;color:var(--t2);font-size:9pt;cursor:pointer;padding:6px 0;margin-bottom:10px;}
.mod-back:hover{color:var(--p);}
.mod-hdr{background:linear-gradient(135deg,var(--s1),var(--s2));border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.mod-hdr h1{font-size:18pt;color:var(--p);margin:0 0 6px;border:none;padding:0;}
.mod-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:8.5pt;color:var(--t2);margin-bottom:8px;}
.mod-desc{color:var(--t2);font-size:9.5pt;}

/* Section cards */
.secs{display:flex;flex-direction:column;gap:10px;max-width:900px;}
.sec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:border-color .2s;}
.sec:hover{border-color:rgba(233,30,99,.35);}
.sec-h{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.sec-h:hover{background:rgba(233,30,99,.02);}
.sec-dot{width:26px;height:26px;border-radius:50%;border:2px solid var(--mt);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:pointer;transition:all .2s;}
.sec-dot.done{border-color:var(--g);background:var(--g);color:#fff;}
.sec-dot.active{border-color:var(--p);background:rgba(233,30,99,.12);color:var(--p);}
.sec-info{flex:1;}
.sec-info h3{font-size:10.5pt;color:var(--tx);margin:0;}
.sec-info small{font-size:7.5pt;color:var(--mt);}
.sec-time{font-size:7.5pt;color:var(--mt);white-space:nowrap;}
.sec-arr{color:var(--mt);font-size:12px;transition:transform .2s;}
.sec.open .sec-arr{transform:rotate(180deg);}
.sec-body{display:none;padding:0 16px 16px;border-top:1px solid rgba(255,255,255,.04);}
.sec.open .sec-body{display:block;animation:fi .25s;}

/* Explanation tabs */
.etabs{display:flex;gap:2px;margin:10px 0 6px;}
.etab{padding:4px 10px;border-radius:6px 6px 0 0;border:1px solid transparent;background:none;color:var(--mt);cursor:pointer;font-size:8pt;font-family:inherit;transition:all .15s;}
.etab:hover{color:var(--pl);}
.etab.on{background:var(--s2);color:var(--p);border-color:var(--bd);border-bottom-color:var(--s2);}
.epanel{display:none;background:var(--s2);border:1px solid var(--bd);border-radius:0 8px 8px 8px;padding:12px 14px;font-size:10pt;line-height:1.65;}
.epanel.on{display:block;}
.epanel.simple{border-left:3px solid var(--gl);}
.epanel.tech{border-left:3px solid var(--p);}
.epanel.deep{border-left:3px solid var(--purple);}
.epanel p{margin:6px 0;}
.ic{font-family:var(--mono);font-size:9pt;background:rgba(233,30,99,.08);padding:1px 5px;border-radius:3px;color:var(--pl);}
.cmap{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.cmap>div{border-radius:8px;padding:10px;font-size:9pt;}
.cm-do{background:rgba(46,125,50,.05);border:1px solid var(--bdg);}
.cm-do b{color:var(--gl);}
.cm-dont{background:rgba(233,30,99,.04);border:1px solid var(--bd);}
.cm-dont b{color:var(--pl);}
.cmap p{margin:3px 0;color:var(--t2);}

/* Quiz */
.quiz{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:12px;margin:10px 0;}
.quiz-q{color:var(--tx);font-size:10pt;margin-bottom:8px;}
.qopts{display:flex;flex-direction:column;gap:5px;}
.qopt{padding:7px 12px;border:1px solid var(--bd);border-radius:8px;cursor:pointer;font-size:9pt;color:var(--t2);background:none;font-family:inherit;width:100%;text-align:left;transition:all .15s;}
.qopt:hover:not(:disabled){border-color:var(--p);color:var(--pl);}
.qopt.yes{border-color:var(--g);background:rgba(46,125,50,.1);color:var(--gl);}
.qopt.no{border-color:var(--danger);background:rgba(255,82,82,.06);color:var(--danger);}
.qfb{margin-top:6px;font-size:9pt;padding:8px;border-radius:6px;display:none;}
.qfb.show{display:block;}
.qfb.win{background:rgba(46,125,50,.08);color:var(--gl);border:1px solid var(--bdg);}
.qfb.lose{background:rgba(255,82,82,.05);color:var(--danger);border:1px solid rgba(255,82,82,.15);}

/* Code blocks */
.cw{margin:10px 0;border:1px solid var(--bdg);border-radius:8px;overflow:hidden;background:#10101c;}
.cwt{display:flex;justify-content:space-between;align-items:center;padding:3px 10px;background:rgba(46,125,50,.1);border-bottom:1px solid var(--bdg);font-size:7pt;}
.cwl{color:var(--g);font-family:var(--mono);font-weight:bold;text-transform:uppercase;letter-spacing:1px;}
.cwb{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--t2);padding:2px 7px;border-radius:4px;cursor:pointer;font-size:7pt;font-family:var(--mono);}
.cwb:hover{background:var(--p);color:#fff;}
pre{font-family:var(--mono);font-size:9.5pt;padding:10px;overflow-x:auto;white-space:pre;line-height:1.5;margin:0;color:var(--tx);background:#10101c;}
pre .c{color:#555;font-style:italic;}pre .g{color:#a5d6a7;}pre .y{color:#fff59d;}pre .b{color:#90caf9;}pre .o{color:#ffcc80;}pre .p{color:#f48fb1;}pre .v{color:#ce93d8;}
.out{background:rgba(46,125,50,.05);border-top:2px solid var(--g);padding:6px 10px;font-family:var(--mono);font-size:8.5pt;color:#a5d6a7;}
.outl{color:var(--g);font-weight:bold;font-size:7pt;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}

/* ═══ CHEATSHEETS VIEW ═══ */
.cs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;max-width:1400px;margin:0 auto;}
.cs-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;}
.cs-head{padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.cs-head h3{font-size:10pt;color:var(--p);margin:0;}
.cs-body{display:none;padding:10px;font-family:var(--mono);font-size:8.5pt;color:var(--t2);max-height:300px;overflow-y:auto;}
.cs-card.open .cs-body{display:block;}
.cs-item{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.03);}

/* ═══ FLOATING ACTIONS ═══ */
.fl{position:fixed;bottom:14px;right:14px;z-index:9999;display:flex;gap:6px;}
.fl button{padding:7px 12px;border:none;border-radius:8px;font-weight:bold;font-size:9pt;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(0,0,0,.3);}
.fl .sv{background:var(--g);color:#fff;}.fl .sv:hover{background:var(--gl);color:#000;}
.fl .pi{background:var(--p);color:#fff;}.fl .pi:hover{background:var(--pl);color:#000;}

@media(max-width:700px){.grid{grid-template-columns:1fr;}.vtabs{display:none;}.cmap{grid-template-columns:1fr;}}
@media print{.top,.fl{display:none!important;}.main{margin:0;}body{background:#fff;color:#333;}@page{size:A4;margin:1.5cm;}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top">
<div class="logo">🌸 Pink Galaxy</div>
<div class="vtabs">
<button class="vtab on" onclick="go('dash')">🏠 Home</button>
<button class="vtab" onclick="go('map')">🧠 Mindmap</button>
<button class="vtab" onclick="go('mod')">📖 Module</button>
<button class="vtab" onclick="go('cs')">⚡ Cheats</button>
</div>
<div class="tright">
<input class="srch" placeholder="🔍 Search… Ctrl+K" onkeydown="if(event.key==='Enter')doSearch(this.value)">
<div class="xp-pill">⭐ <span id="xpN">0</span></div>
<div class="streak-pill">🔥 <span id="skN">0</span></div>
<div class="lvl-pill" id="lvlN">🌱 Lv1</div>
<button class="tb" onclick="saveAll()" title="Save">💾</button>
</div>
</div>

<!-- ═══ VIEWS ═══ -->
<div class="main">

<!-- DASHBOARD -->
<div class="view on" id="v-dash">
<div class="dash-head">
<h1>🌸 Pink Galaxy Platform</h1>
<p>Arch Linux · BlackArch · Bash · Python · Cloud · Security — everything, interconnected</p>
</div>
<div class="stats">
<div class="stat"><b id="sM">0</b><small>Modules Done</small></div>
<div class="stat gn"><b id="sS">0</b><small>Sections</small></div>
<div class="stat"><b id="sX">0</b><small>XP Earned</small></div>
<div class="stat gn"><b id="sK">0</b><small>Day Streak 🔥</small></div>
</div>
<div class="uni-row" id="uniRow"></div>
<div class="frow" id="diffRow"></div>
<div class="grid" id="grid"></div>
</div>

<!-- MINDMAP -->
<div class="view" id="v-map">
<div class="map-bar" id="mapBar"></div>
<div class="map-c" id="mapC" style="height:560px;"></div>
<div class="map-legend" id="mapLeg"></div>
</div>

<!-- MODULE DETAIL -->
<div class="view" id="v-mod">
<div id="modBox"><div class="mod-back" onclick="go('dash')">← Dashboard</div><div class="mod-hdr"><h1 id="mT">Select a module</h1><div class="mod-meta" id="mM"></div><div class="mod-desc" id="mD"></div><div class="card-bar" style="margin-top:10px;"><div class="bar"><div class="fill" id="mP" style="width:0%"></div></div><span class="pct" id="mPn">0%</span></div></div><div class="secs" id="mSecs"></div></div>
</div>

<!-- CHEATSHEETS -->
<div class="view" id="v-cs">
<div style="max-width:1200px;margin:0 auto;">
<h1 style="color:var(--p);border-bottom:2px solid var(--p);padding-bottom:8px;margin-bottom:16px;">⚡ Quick Reference</h1>
<div class="cs-grid" id="csGrid"></div>
</div>
</div>

</div>

<div class="fl">
<button class="pi" onclick="addPostit()">📌</button>
<button class="sv" onclick="saveAll()">💾 Save</button>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   PINK GALAXY PLATFORM — ENGINE v3
   All modules across all universes in one data structure
   ═══════════════════════════════════════════════════════ */

const U={
  ARCH:{name:'Arch Linux',icon:'🐧',color:'#c62828'},
  BASH:{name:'Bash & Scripting',icon:'🐚',color:'#2e7d32'},
  PYTHON:{name:'Python',icon:'🐍',color:'#1565c0'},
  SEC:{name:'Security & BlackArch',icon:'🔒',color:'#ff5252'},
  CLOUD:{name:'Cloud & DevOps',icon:'☁️',color:'#ff9800'},
  REF:{name:'Tools & Reference',icon:'📚',color:'#9c27b0'},
  GUIDES:{name:'Installation Guides',icon:'🌸',color:'#e91e63'}
};

const M=[

  const g=document.getElementById('grid');g.innerHTML='';

function updStats(){
  const [lvlName,lvlNum]=getLvl(S.xp);
  document.getElementById('xpN').textContent=S.xp;
  document.getElementById('sX').textContent=S.xp;
  document.getElementById('skN').textContent=S.sk;
  document.getElementById('sK').textContent=S.sk;
  document.getElementById('lvlN').textContent=lvlName+' Lv'+lvlNum;
  let doneM=0,doneS=0;
  M.forEach(m=>{const dn=S.d[m.id]||{};const c=Object.values(dn).filter(Boolean).length;doneS+=c;if(c===m.secs.length&&m.secs.length>0)doneM++;});
  document.getElementById('sM').textContent=doneM+'/'+M.length;
  document.getElementById('sS').textContent=doneS;
  const today=new Date().toISOString().slice(0,10);
  if(S.lv!==today){const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);S.sk=S.lv===yest?S.sk+1:1;S.lv=today;sv();}
}

function buildBASHF01_S0(){return`
<div class="etabs">
<button class="etab on" onclick="switchE(this,'simple')">🧑 Simple</button>
<button class="etab" onclick="switchE(this,'tech')">🔧 Technical</button>
<button class="etab" onclick="switchE(this,'deep')">⚙️ Deep Dive</button>
</div>
<div class="epanel simple on" data-lv="simple">
<p><b>Imagine you have a morning routine:</b> wake up, make coffee, check email, open your code editor. You do the same thing every single day. Now imagine you could press ONE button and all of that happens automatically. That is what a bash script is — a text file that contains a list of commands, and when you run it, the computer executes them one by one, exactly as if you typed them yourself, but instantly.</p>
<p>A script turns repetitive work into a single click. Instead of typing 15 commands to deploy your project, you type <span class="ic">./deploy.sh</span> and go make coffee. Instead of manually checking logs on 5 servers, you run <span class="ic">./check-all.sh</span> and get a summary in 2 seconds.</p>
<p><b>Key takeaway:</b> A bash script is just a text file full of commands that run automatically when you execute the file.</p>
</div>
<div class="epanel tech" data-lv="tech">
<p>A bash script is a plain text file containing a sequence of shell commands interpreted by the Bash shell (<span class="ic">/bin/bash</span>). When you execute a script, the shell opens the file, reads it line by line, parses each line into tokens (command + arguments), and executes them in sequence. The script runs in a child process (subshell) of your current shell, meaning it inherits the environment variables but changes to variables inside the script do not affect the parent shell (unless you <span class="ic">source</span> it).</p>
<p>Scripts support all the programming constructs you would expect: variables, conditionals (<span class="ic">if/else</span>), loops (<span class="ic">for/while</span>), functions, and error handling. They can accept command-line arguments via positional parameters (<span class="ic">$1, $2, $@</span>), read from stdin, write to stdout/stderr, and return exit codes (0 = success, non-zero = failure).</p>
<p><b>Key takeaway:</b> A script is a program written in shell syntax, executed by the bash interpreter in a child process.</p>
</div>
<div class="epanel deep" data-lv="deep">
<p>When you run <span class="ic">./script.sh</span>, the kernel performs these steps at the syscall level: (1) Your current shell calls <span class="ic">fork()</span> → the kernel duplicates the process descriptor (task_struct), creates a new PID, and sets up copy-on-write page table entries. (2) The child process calls <span class="ic">execve("./script.sh", ...)</span>. The kernel reads the first 2 bytes of the file — if they are <span class="ic">#!</span> (the shebang magic number, 0x23 0x21), it extracts the interpreter path from that first line (e.g., <span class="ic">/bin/bash</span>). (3) The kernel then calls <span class="ic">execve("/bin/bash", ["bash", "./script.sh"], environ)</span> — it replaces the child's memory image with the bash binary, sets up the ELF segments (text, data, bss, heap, stack), and starts execution at bash's entry point. (4) Bash opens <span class="ic">script.sh</span> as a file descriptor, reads it into an internal buffer, and enters its main read-eval loop: read a line → lex → parse → expand → execute. Each command in the script triggers another fork/exec cycle (unless it is a bash builtin like <span class="ic">cd</span> or <span class="ic">echo</span>, which execute within the bash process itself).</p>
<p><b>Key takeaway:</b> The kernel uses the shebang to determine the interpreter, then the interpreter reads the file and executes commands via recursive fork/exec calls.</p>
</div>
<div class="cmap"><div class="cm-do"><b>✅ If you learn scripting:</b><p>You automate hours of repetitive work into seconds. You build deployment pipelines, monitoring tools, and data processing workflows. Every DevOps, sysadmin, and security role requires bash scripting. It is the universal glue of Linux.</p></div><div class="cm-dont"><b>❌ If you skip this:</b><p>You type the same commands manually every day. You cannot automate backups, deployments, or monitoring. You are locked out of CI/CD pipelines (GitHub Actions, Jenkins — all based on shell scripts). You remain a tool user instead of a tool builder.</p></div></div>
<div class="quiz"><div class="quiz-q">🧪 What is the primary purpose of a bash script?</div><div class="qopts">
<button class="qopt" onclick="checkQ(this,true)">To automate a sequence of commands that would otherwise be typed manually</button>
<button class="qopt" onclick="checkQ(this,false)">To make your terminal look prettier</button>
<button class="qopt" onclick="checkQ(this,false)">To replace Python for all programming tasks</button>
</div><div class="qfb"></div></div>`;}

function buildBASHF01_S2(){return`
<div class="etabs">
<button class="etab on" onclick="switchE(this,'simple')">🧑 Simple</button>
<button class="etab" onclick="switchE(this,'tech')">🔧 Technical</button>
<button class="etab" onclick="switchE(this,'deep')">⚙️ Deep Dive</button>
</div>
<div class="epanel simple on" data-lv="simple">
<p>Let's build your very first script. Open your terminal, create a new file, write some commands in it, and run it. That's it — three steps to becoming a script writer.</p>
</div>
<div class="epanel tech" data-lv="tech">
<p>We will create a script that prints system information: hostname, kernel version, uptime, disk usage, and IP address. This demonstrates variable assignment, command substitution, and formatted output — the building blocks of every useful script.</p>
</div>
<div class="epanel deep" data-lv="deep">
<p>Each command in the script triggers a fork/exec cycle. The <span class="ic">$(hostname)</span> syntax is command substitution: bash forks a subshell, executes <span class="ic">hostname</span> in it (which reads <span class="ic">/proc/sys/kernel/hostname</span>), captures its stdout via a pipe, and substitutes the output into the parent shell's command line before executing <span class="ic">echo</span>.</p>
</div>
<div class="cw"><div class="cwt"><span class="cwl">bash</span><button class="cwb" onclick="cpC(this)">Copy</button></div>
<pre><span class="c">#!/bin/bash</span>
<span class="c"># sysinfo.sh — My first Pink Galaxy script 🌸</span>
<span class="c"># Shows useful system information at a glance</span>

// ═══ MINDMAP ═══
function renderMap(type){
  const c=document.getElementById('mapC');const W=c.offsetWidth,H=c.offsetHeight||560;c.innerHTML='';
  if(type==='clusters'){
    const groups={};M.forEach(m=>{if(!groups[m.u])groups[m.u]=[];groups[m.u].push(m);});
    const ukeys=Object.keys(groups);const cols=Math.ceil(Math.sqrt(ukeys.length));
    ukeys.forEach((uk,gi)=>{
      const col=gi%cols,row=Math.floor(gi/cols);
      const cx=W/(cols+1)*(col+1);const cy=H/(Math.ceil(ukeys.length/cols)+1)*(row+1);
      const mods=groups[uk];const r=Math.min(W/(cols+1)*0.35,H/3*0.4);
      mods.forEach((m,i)=>{
        const a=(i/mods.length)*Math.PI*2-Math.PI/2;
        const sz=22+m.xp/12;
        const x=cx+Math.cos(a)*r-sz/2;const y=cy+Math.sin(a)*r-sz/2;
        const n=document.createElement('div');n.className='mn';n.dataset.u=m.u;
        n.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;`;
        n.textContent=m.id.split('-').pop().replace(/^[A-Z]+/,'');
        n.title=m.title;n.onclick=()=>openMod(m.id);c.appendChild(n);
      });
    });
  }else if(type==='radial'){
    const cx=W/2,cy=H/2;
    M.forEach((m,i)=>{
      const a=(i/M.length)*Math.PI*2-Math.PI/2;const r=Math.min(W,H)*0.38;
      const x=cx+Math.cos(a)*r-18;const y=cy+Math.sin(a)*r-18;
      const n=document.createElement('div');n.className='mn';n.dataset.u=m.u;
      n.style.cssText=`left:${x}px;top:${y}px;width:36px;height:36px;font-size:6.5pt;`;
      n.textContent=m.id.split('-').pop();n.title=m.title;n.onclick=()=>openMod(m.id);c.appendChild(n);
      const l=document.createElement('div');l.className='ml';
      const dx=x+18-cx,dy=y+18-cy,len=Math.sqrt(dx*dx+dy*dy);
      l.style.cssText=`left:${cx}px;top:${cy}px;width:${len}px;transform:rotate(${Math.atan2(dy,dx)}rad);`;
      c.appendChild(l);
    });
    const cn=document.createElement('div');cn.className='mn';cn.dataset.u='GUIDES';
    cn.style.cssText=`left:${cx-24}px;top:${cy-24}px;width:48px;height:48px;font-size:16px;`;
    cn.textContent='🌸';c.appendChild(cn);
  }else if(type==='heatmap'){
    const cols=Math.ceil(Math.sqrt(M.length));const cw=Math.floor(W/cols)-4;const ch=Math.floor(H/Math.ceil(M.length/cols))-4;
    M.forEach((m,i)=>{
      const col=i%cols,row=Math.floor(i/cols);
      const dn=S.d[m.id]||{};const t=m.secs.length;const done=Object.values(dn).filter(Boolean).length;
      const pct=t?done/t:0;
      const r=Math.round(255*(1-pct)),g=Math.round(180*pct);
      const n=document.createElement('div');n.className='mn';n.dataset.u=m.u;
      n.style.cssText=`left:${col*(cw+4)+2}px;top:${row*(ch+4)+2}px;width:${cw}px;height:${ch}px;border-radius:4px;background:rgba(${r},${g},80,0.7);font-size:7pt;`;
      n.textContent=m.id;n.title=m.title+' ('+Math.round(pct*100)+'%)';n.onclick=()=>openMod(m.id);c.appendChild(n);
    });
  }else{
    M.forEach(m=>{
      const x=40+Math.random()*(W-80);const y=30+Math.random()*(H-60);const sz=24+m.xp/10;
      const n=document.createElement('div');n.className='mn';n.dataset.u=m.u;
      n.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;font-size:${Math.max(6,sz/5)}pt;`;
      n.textContent=m.id.split('-').pop();n.title=m.title;n.onclick=()=>openMod(m.id);c.appendChild(n);
    });
  }
}
